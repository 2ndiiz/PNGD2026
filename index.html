<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNGD Budget 2026 — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f3ef;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #dddbd3;
    --text: #1a1917;
    --text2: #6b6860;
    --text3: #9e9c95;
    --blue: #1a56a0;
    --blue-light: #e8f0fb;
    --green: #0d7a5f;
    --green-light: #e4f5ef;
    --amber: #b45309;
    --amber-light: #fef3c7;
    --red: #b91c1c;
    --red-light: #fee2e2;
    --accent: #1a56a0;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans Thai', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

  /* ── Header ── */
  .header { background: var(--text); color: #fff; padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .header-left { display: flex; align-items: baseline; gap: 14px; }
  .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.45); font-family: 'IBM Plex Mono', monospace; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  #loadBtn { background: var(--blue); color: #fff; border: none; padding: 7px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
  #loadBtn:hover { opacity: .85; }
  #statusBadge { font-size: 11px; font-family: 'IBM Plex Mono', monospace; padding: 4px 10px; border-radius: 99px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
  #statusBadge.ok { background: #14532d22; color: #4ade80; border: 1px solid #4ade8044; }
  #statusBadge.err { background: #7f1d1d22; color: #f87171; border: 1px solid #f8717144; }

  /* ── Filters ── */
  .filters { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 28px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .filter-label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
  select { font-family: inherit; font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); cursor: pointer; min-width: 130px; }

  /* ── Main layout ── */
  .main { padding: 20px 28px; }

  /* ── KPI row ── */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
  .kpi-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .kpi-value { font-size: 22px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; letter-spacing: -1px; }
  .kpi-value.blue { color: var(--blue); }
  .kpi-value.green { color: var(--green); }
  .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  
  .kpi-badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 99px; font-weight: 500; font-family: 'IBM Plex Mono', monospace; }
  .badge-over { background: var(--red-light); color: var(--red); }
  .badge-under { background: var(--green-light); color: var(--green); }
  .badge-zero { background: var(--surface2); color: var(--text3); }

  /* ── Two-col layout ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--text2); }
  .card-body { padding: 16px; }

  /* ── Chart ── */
  .chart-wrap { position: relative; width: 100%; height: 240px; }

  /* ── Pivot table ── */
  .table-scroll { overflow-x: auto; }
  table.pivot { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
  table.pivot th { background: var(--surface2); color: var(--text2); font-weight: 600; font-size: 11px; text-transform: uppercase; padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
  table.pivot th:first-child, table.pivot th:nth-child(2), table.pivot th:nth-child(3), table.pivot th:nth-child(4), table.pivot th:nth-child(5) { text-align: left; }
  table.pivot td { padding: 6px 10px; text-align: right; border-bottom: 1px solid #f0ede6; vertical-align: top; color: var(--text); }
  table.pivot td.left { text-align: left; }
  table.pivot td.mono { font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
  table.pivot tr.forecast-row td { color: var(--blue); }
  table.pivot tr.actual-row td { color: var(--green); }
  .type-badge { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 99px; font-weight: 500; }
  .type-fc { background: var(--blue-light); color: var(--blue); }
  .type-ac { background: var(--green-light); color: var(--green); }
  .cat-opex { background: var(--amber-light); color: var(--amber); font-size: 10px; padding: 1px 6px; border-radius: 99px; }
  .cat-capex { background: #f3e8ff; color: #7c3aed; font-size: 10px; padding: 1px 6px; border-radius: 99px; }
  .desc-cell { max-width: 220px; white-space: normal; line-height: 1.4; font-size: 12px; }

  /* ── Loading ── */
  .loading-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .url-input-wrap { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius); padding: 4px 4px 4px 12px; min-width: 320px; }
  .url-input { background: transparent; border: none; color: rgba(255,255,255,0.8); font-size: 12px; font-family: 'IBM Plex Mono', monospace; flex: 1; outline: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">PNGD Budget 2026</span>
    <span class="header-sub">Forecast vs Actual</span>
  </div>
  <div class="header-right">
    <div class="url-input-wrap">
      <input class="url-input" id="sheetUrl" placeholder="วาง Google Sheet URL..." value="https://docs.google.com/spreadsheets/d/1SLO4HOK2NGqyMaMM2_hEd7aN8OeltML7HMX9SBD_7Bs">
    </div>
    <button id="loadBtn" onclick="loadData()">⟳ โหลดข้อมูล</button>
    <span id="statusBadge">ยังไม่ได้โหลด</span>
  </div>
</div>

<div class="filters">
  <span class="filter-label">Filter</span>
  <select id="fAC" onchange="applyFilters()"><option value="">Activity ทั้งหมด</option></select>
  <select id="fCat" onchange="applyFilters()"><option value="">OPEX + CAPEX</option><option value="OPEX">OPEX เท่านั้น</option><option value="CAPEX">CAPEX เท่านั้น</option></select>
  <select id="fUser" onchange="applyFilters()"><option value="">User ทั้งหมด</option></select>
  <select id="fStatus" onchange="applyFilters()"><option value="">Status ทั้งหมด</option></select>
  <select id="fType" onchange="applyFilters()"><option value="">Forecast + Actual</option><option value="Forecast">Forecast</option><option value="Actual">Actual</option></select>
</div>

<div class="main">
  <div id="appContent">
    <div class="loading-state">📊 กดปุ่ม "โหลดข้อมูล" เพื่อเริ่มต้น</div>
  </div>
</div>

<script>
const MONTHS = ['01-Jan','02-Feb','03-Mar','04-Apr','05-May','06-June','07-July','08-Aug','09-Sep','10-Oct','11-Nov','12-Dec'];
const MLABELS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let RAW = [];
let barChart = null, donutChart = null;

function extractSheetId(url) {
  const m = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  return m ? m[1] : null;
}

function fmtN(v) { return v === 0 ? '—' : Math.round(v).toLocaleString('th-TH'); }
function fmtM(v) {
  const a = Math.abs(v);
  const sign = v < 0 ? '-' : '';
  if (a >= 1e6) return sign + (a/1e6).toFixed(2) + 'M';
  if (a >= 1e3) return sign + Math.round(a/1e3) + 'K';
  return sign + Math.round(a).toLocaleString();
}

async function loadData() {
  const url = document.getElementById('sheetUrl').value.trim();
  const sheetId = extractSheetId(url);
  if (!sheetId) { setStatus('URL ไม่ถูกต้อง', 'err'); return; }

  const btn = document.getElementById('loadBtn');
  btn.textContent = '…กำลังโหลด';
  btn.disabled = true;
  setStatus('กำลังโหลด…', '');

  const apiUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=Alldata`;

  try {
    const res = await fetch(apiUrl);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    
    // --- จุดที่เรียกใช้การแปลงข้อมูล ---
    RAW = parseGViz(json);
    
    setStatus(`✓ ${RAW.length} rows`, 'ok');
    renderApp(); 
    populateFilters();
    applyFilters();
  } catch(e) {
    setStatus('โหลดไม่ได้ — เช็ค Share Settings', 'err');
  }
  btn.textContent = '⟳ โหลดข้อมูล';
  btn.disabled = false;
}

function setStatus(msg, cls) {
  const el = document.getElementById('statusBadge');
  el.textContent = msg;
  el.className = cls;
}

// ── ฟังก์ชันที่ช่วยให้กราฟทำงาน (Engine) ──
function parseGViz(json) {
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.filter(r => r).map(r => {
    const row = {};
    cols.forEach((c, i) => {
      const cell = r.c[i];
      let val = cell ? (cell.v !== null ? cell.v : '') : '';
      // ล้างคอมม่าอัตโนมัติ
      if (typeof val === 'string' && (c === 'Amount' || c === 'Forecast' || c === 'Actual')) {
        val = val.replace(/,/g, '');
      }
      row[c] = val;
    });
    // แมปค่าให้กราฟหาเจอ
    if (row['Amount'] && !row['Forecast'] && row['Type'] === 'Forecast') row['Forecast'] = row['Amount'];
    if (row['Amount'] && !row['Actual'] && row['Type'] === 'Actual') row['Actual'] = row['Amount'];
    return row;
  }).filter(r => r['Activity Code']);
}

function populateFilters() {
  const getUniq = (k) => [...new Set(RAW.map(r => r[k]).filter(Boolean))].sort();
  const setOpts = (id, vals) => {
    const sel = document.getElementById(id);
    sel.innerHTML = sel.options[0].outerHTML;
    vals.forEach(v => { const o = document.createElement('option'); o.value = v; o.text = v; sel.appendChild(o); });
  };
  setOpts('fAC', getUniq('Activity Code'));
  setOpts('fUser', getUniq('User'));
  setOpts('fStatus', getUniq('Status'));
}

function applyFilters() {
  const ac = document.getElementById('fAC').value;
  const cat = document.getElementById('fCat').value;
  const user = document.getElementById('fUser').value;
  const status = document.getElementById('fStatus').value;
  const type = document.getElementById('fType').value;

  const data = RAW.filter(r => 
    (!ac || r['Activity Code'] === ac) &&
    (!cat || r['Category (OPEX/CAPEX)'] === cat) &&
    (!user || r['User'] === user) &&
    (!status || r['Status'] === status) &&
    (!type || r['Type'] === type)
  );

  renderKPIs(data);
  renderChart(data);
  renderDonut(data);
  renderTable(data);
}

function renderKPIs(data) {
  const fc = data.filter(r => r['Type'] === 'Forecast').reduce((s, r) => s + (parseFloat(r['Forecast']) || 0), 0);
  const ac = data.filter(r => r['Type'] === 'Actual').reduce((s, r) => s + (parseFloat(r['Actual']) || 0), 0);
  const variance = ac - fc;
  
  document.getElementById('kpiEl').innerHTML = `
    <div class="kpi"><div class="kpi-label">Forecast</div><div class="kpi-value blue">${fmtM(fc)}</div><div class="kpi-sub">฿${fmtN(fc)}</div></div>
    <div class="kpi"><div class="kpi-label">Actual</div><div class="kpi-value green">${fmtM(ac)}</div><div class="kpi-sub">฿${fmtN(ac)}</div></div>
    <div class="kpi"><div class="kpi-label">Utilization</div><div class="kpi-value">${fc > 0 ? ((ac/fc)*100).toFixed(1) : 0}%</div></div>
    <div class="kpi"><div class="kpi-label">Variance</div><div class="kpi-value" style="color:${variance > 0 ? 'var(--red)' : 'var(--green)'}">${fmtM(variance)}</div></div>
  `;
}

function renderChart(data) {
  const getVals = (t) => MONTHS.map(m => data.filter(r => r['Month'] === m && r['Type'] === t).reduce((s, r) => s + (parseFloat(r['Amount']) || 0), 0));
  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart').getContext('2d'), {
    type: 'bar',
    data: { labels: MLABELS, datasets: [
      { label: 'Forecast', data: getVals('Forecast'), backgroundColor: 'rgba(26,86,160,0.7)' },
      { label: 'Actual', data: getVals('Actual'), backgroundColor: 'rgba(13,122,95,0.75)' }
    ]},
    options: { responsive: true, maintainAspectRatio: false }
  });
}

function renderDonut(data) {
  const opex = data.filter(r => r['Category (OPEX/CAPEX)'] === 'OPEX').reduce((s,r) => s + (parseFloat(r['Amount']) || 0), 0);
  const capex = data.filter(r => r['Category (OPEX/CAPEX)'] === 'CAPEX').reduce((s,r) => s + (parseFloat(r['Amount']) || 0), 0);
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donutChart').getContext('2d'), {
    type: 'doughnut',
    data: { labels: ['OPEX', 'CAPEX'], datasets: [{ data: [opex, capex], backgroundColor: ['#b4530977', '#7c3aed77'] }]},
    options: { responsive: true, maintainAspectRatio: false }
  });
}

function renderTable(data) {
  let html = `<table class="pivot"><thead><tr><th>Activity</th><th>User</th><th>Type</th><th>Month</th><th>Amount</th><th>Description</th></tr></thead><tbody>`;
  data.forEach(r => {
    html += `<tr><td class="left mono">${r['Activity Code']}</td><td class="left">${r['User']}</td><td><span class="type-badge ${r['Type'] === 'Forecast' ? 'type-fc' : 'type-ac'}">${r['Type']}</span></td><td>${r['Month']}</td><td class="mono"><strong>${fmtN(parseFloat(r['Amount']))}</strong></td><td class="left desc-cell">${r['Description']}</td></tr>`;
  });
  document.getElementById('pivotEl').innerHTML = html + '</tbody></table>';
}

function renderApp() {
  document.getElementById('appContent').innerHTML = `
    <div class="kpi-row" id="kpiEl"></div>
    <div class="two-col">
      <div class="card"><div class="card-header"><span class="card-title">Forecast vs Actual</span></div><div class="card-body"><div class="chart-wrap"><canvas id="barChart"></canvas></div></div></div>
      <div class="card"><div class="card-header"><span class="card-title">OPEX / CAPEX</span></div><div class="card-body"><div class="chart-wrap"><canvas id="donutChart"></canvas></div></div></div>
    </div>
    <div class="card"><div class="card-body"><div class="table-scroll" id="pivotEl"></div></div></div>
  `;
}

window.onload = () => { if(RAW.length) renderApp(); };
</script>
</body>
</html>
